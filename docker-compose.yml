services:
  crawler:
    build:
      context: .
      dockerfile: Dockerfile.crawler
    container_name: jobcrawliya_crawler
    volumes:
      - ./data:/usr/src/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    shm_size: "1gb"

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: jobcrawliya_streamlit
    volumes:
      - ./data:/usr/src/app/data
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      - crawler
